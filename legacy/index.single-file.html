        };

        const hueBetween = (h, start, end) => start <= end ? h >= start && h < end : h >= start || h < end;
        const themePrimary = (theme) => hexToHsl(theme.primaryColor);
        const themeBackground = (theme) => hexToHsl(theme.backgroundColor);
        const isNeutralTheme = (theme) => themePrimary(theme).s < 12 || ['#000000', '#FFFFFF', '#111827'].includes((theme.primaryColor || '').toUpperCase());

        const THEME_PALETTE_FILTERS = [
            { id: 'all', name: 'All', hint: 'Full Library', swatches: ['#050505', '#FFFFFF', '#39FF14'], match: () => true },
            { id: 'light', name: 'Light', hint: 'Clean & Airy', swatches: ['#FFFFFF', '#F8FAFC', '#E5E7EB'], match: (theme) => themeBackground(theme).l >= 92 },
            { id: 'dark', name: 'Dark', hint: 'Noir & Night', swatches: ['#030712', '#111827', '#39FF14'], match: (theme) => themeBackground(theme).l < 18 },
            { id: 'blue', name: 'Blue', hint: 'Calm & Trust', swatches: ['#DBEAFE', '#2563EB', '#082F49'], match: (theme) => hueBetween(themePrimary(theme).h, 190, 255) && !isNeutralTheme(theme) },
            { id: 'green', name: 'Green', hint: 'Fresh & Natural', swatches: ['#D1FAE5', '#10B981', '#064E3B'], match: (theme) => hueBetween(themePrimary(theme).h, 95, 170) && !isNeutralTheme(theme) },
            { id: 'purple', name: 'Purple', hint: 'Creative & Luxe', swatches: ['#EDE9FE', '#7C3AED', '#2E1065'], match: (theme) => hueBetween(themePrimary(theme).h, 255, 295) && !isNeutralTheme(theme) },
            { id: 'pink', name: 'Pink', hint: 'Soft & Bold', swatches: ['#FCE7F3', '#DB2777', '#500724'], match: (theme) => hueBetween(themePrimary(theme).h, 295, 345) && !isNeutralTheme(theme) },
            { id: 'red', name: 'Red', hint: 'Drama & Heat', swatches: ['#FFE4E6', '#BE123C', '#4C0519'], match: (theme) => hueBetween(themePrimary(theme).h, 345, 15) && !isNeutralTheme(theme) },
            { id: 'orange', name: 'Orange', hint: 'Bright & Warm', swatches: ['#FFEDD5', '#F97316', '#431407'], match: (theme) => hueBetween(themePrimary(theme).h, 15, 38) && !isNeutralTheme(theme) },
            { id: 'yellow', name: 'Yellow', hint: 'Sunny & Sharp', swatches: ['#FEF9C3', '#EAB308', '#422006'], match: (theme) => hueBetween(themePrimary(theme).h, 38, 60) && !isNeutralTheme(theme) },
            { id: 'amber', name: 'Amber', hint: 'Warm & Sunny', swatches: ['#FEF3C7', '#F59E0B', '#451A03'], match: (theme) => hueBetween(themePrimary(theme).h, 15, 55) && !isNeutralTheme(theme) },
            { id: 'earth', name: 'Earth', hint: 'Organic & Grounded', swatches: ['#ECFCCB', '#4D7C0F', '#2C4C3B'], match: (theme) => hueBetween(themePrimary(theme).h, 55, 95) && !isNeutralTheme(theme) },
            { id: 'neutral', name: 'Neutral', hint: 'Black, White, Grey', swatches: ['#000000', '#F9FAFB', '#6B7280'], match: isNeutralTheme }
        ];

        const normalizeHexColor = (color, fallback = '#000000') => {
            if (!color || typeof color !== 'string' || color === 'transparent') return fallback;
            const clean = color.trim();
            if (/^#[0-9a-fA-F]{3}$/.test(clean)) {
                return `#${clean.slice(1).split('').map(char => char + char).join('')}`.toUpperCase();
            }
            if (/^#[0-9a-fA-F]{6}$/.test(clean)) return clean.toUpperCase();
            return fallback;
        };

        const hexToRgb = (color, fallback = '#000000') => {
            const hex = normalizeHexColor(color, fallback).replace('#', '');
            return {
                r: parseInt(hex.slice(0, 2), 16),
                g: parseInt(hex.slice(2, 4), 16),
                b: parseInt(hex.slice(4, 6), 16)
            };
        };

        const rgbaFromHex = (color, alpha = 1, fallback = '#000000') => {
            const { r, g, b } = hexToRgb(color, fallback);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        };

        const mixHexColors = (base, overlay, amount = 0.5) => {
            const a = hexToRgb(base, '#FFFFFF');
            const b = hexToRgb(overlay, '#000000');
            const mix = (start, end) => Math.round(start + (end - start) * amount).toString(16).padStart(2, '0');
            return `#${mix(a.r, b.r)}${mix(a.g, b.g)}${mix(a.b, b.b)}`.toUpperCase();
        };

        const readableTextFor = (backgroundColor) => {
            const { r, g, b } = hexToRgb(backgroundColor, '#000000');
            const luminance = [r, g, b].map(value => {
                const c = value / 255;
                return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
            });
            const score = 0.2126 * luminance[0] + 0.7152 * luminance[1] + 0.0722 * luminance[2];
            return score > 0.58 ? '#000000' : '#FFFFFF';
        };

        // --- STABLE COMPONENTS ---
        const ProButton = memo(({ children, onClick, className = "", variant = "primary", disabled = false }) => {
            const base = "relative px-12 py-5 rounded-full font-bold transition-all duration-1000 flex items-center justify-center gap-3 overflow-hidden active:scale-95 disabled:opacity-10 disabled:cursor-not-allowed text-[11px] uppercase tracking-[0.4em]";
            const variants = {
                primary: "bg-black text-white hover:bg-neutral-800 shadow-[0_40px_80px_-15px_rgba(0,0,0,0.3)]",
                neon: "bg-[#39FF14] text-black hover:shadow-[0_40px_80px_-15px_rgba(57,255,20,0.4)]",
                outline: "border border-neutral-100 text-black hover:bg-neutral-50",
                ghost: "text-neutral-300 hover:text-black transition-colors"
            };
            return (
                <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>
                {children}
                </button>
            );
        });

        const getLocalDateStr = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

        // --- PUBLIC BOOKING ENGINE (WITH NEW EXTENSIONS & SPECIFIC FONTS) ---
        const BookingFlow = memo(({ settings, onComplete, isPreview = false, onInspect }) => {
            const [step, setStep] = useState(1);
            const [selectedDateIdx, setSelectedDateIdx] = useState(0);
            const [selectedTime, setSelectedTime] = useState(null);
            const [formData, setFormData] = useState({ name: '', phone: '', birthday: '' });
            const [isInitialLoading, setIsInitialLoading] = useState(settings.features?.loadingScreen);
            const [openFaq, setOpenFaq] = useState(null);

            useEffect(() => {
                if (settings.features?.loadingScreen) {
                    setIsInitialLoading(true);
                    const t = setTimeout(() => setIsInitialLoading(false), 1500);
                    return () => clearTimeout(t);
                } else {
                    setIsInitialLoading(false);
                }
            }, [settings.features?.loadingScreen, isPreview]);

            const dates = useMemo(() => {
                const arr = [];
                let d = new Date();
                d.setHours(0,0,0,0);
                let daysChecked = 0;
                while(arr.length < 14 && daysChecked < 365) {
                    const localDateStr = getLocalDateStr(d);
                    const dayConfig = settings.schedule?.[localDateStr];
                    const isAvailable = dayConfig ? dayConfig.available : true;
                    if (isAvailable) {
                        arr.push({ full: d.toDateString(), dayName: d.toLocaleDateString('en-US', { weekday: 'short' }), dayNum: d.getDate(), month: d.toLocaleDateString('en-US', { month: 'long' }), year: d.getFullYear(), localDateStr });
                    }
                    d.setDate(d.getDate() + 1);
                    daysChecked++;
                }
                return arr;
            }, [settings.schedule]);

            useEffect(() => {
                setSelectedDateIdx(0);
                setSelectedTime(null);
            }, [dates]);

            const activeDate = dates[selectedDateIdx] || dates[0];
            
            const availableTimesForActiveDate = useMemo(() => {
                if (!activeDate) return [];
                const dayConfig = settings.schedule?.[activeDate.localDateStr];
                return dayConfig && dayConfig.times ? dayConfig.times : settings.availableTimes;
            }, [activeDate, settings.schedule, settings.availableTimes]);

            const isWaitlistMode = availableTimesForActiveDate.length === 0 && settings.features?.waitlist;

            const handleFirstAvailable = (e) => {
                e.stopPropagation();
                const nextIdx = dates.findIndex(d => {
                    const dayConfig = settings.schedule?.[d.localDateStr];
                    const times = dayConfig && dayConfig.times ? dayConfig.times : settings.availableTimes;
                    return times.length > 0;
                });
                if (nextIdx !== -1) {
                    setSelectedDateIdx(nextIdx);
                    setSelectedTime(null);
                }
            };

            const dynamicStyles = {
                fontFamily: getFontFamily(settings.bodyFontFamily || settings.fontFamily),
                color: settings.bodyColor || '#666666',
                backgroundColor: settings.backgroundColor || '#ffffff'
            };

            const inspectClass = isPreview ? "cursor-pointer hover:ring-1 hover:ring-[#39FF14] hover:ring-offset-4 rounded transition-all duration-300 group/inspect relative" : "";

            const handleAction = () => {
                if (isPreview) { onInspect('copy'); return; }
                if ((selectedTime || isWaitlistMode) && formData.name && formData.phone) {
                    onComplete(formData, activeDate.full, isWaitlistMode ? 'Waitlist' : selectedTime, isWaitlistMode ? 'waitlist' : 'pending', activeDate.localDateStr);
                    setStep(2);
                }
            };

            const getDateSlotStyle = (isActive) => {
                const bg = isActive ? (settings.dateActiveBgColor || 'transparent') : (settings.dateBgColor || 'transparent');
                const text = isActive ? (settings.dateActiveTextColor || '#000000') : (settings.dateTextColor || '#666666');
                const radius = settings.buttonStyle === 'pill' ? '32px' : '12px';
                return { backgroundColor: bg, color: text, borderRadius: radius, border: isActive && bg === 'transparent' ? '1px solid transparent' : (bg !== 'transparent' ? 'none' : '1px solid transparent'), fontFamily: getFontFamily(settings.dateFontFamily || settings.fontFamily) };
            };

            const getTimeSlotStyle = (isActive) => {
                const isSolid = settings.availabilityStyle === 'solid';
                const isOutline = settings.availabilityStyle === 'outline';
                const radius = settings.buttonStyle === 'pill' ? '9999px' : '12px';
                const activeColor = settings.primaryColor;
                const baseTextColor = settings.slotTextColor || '#000000';
                const fontF = getFontFamily(settings.slotFontFamily || settings.fontFamily);

                if (isSolid) {
                    return { backgroundColor: isActive ? activeColor : (settings.slotBgColor || '#f5f5f5'), color: isActive ? '#000000' : baseTextColor, borderRadius: radius, border: '1px solid transparent', boxShadow: isActive ? `0 10px 30px -10px ${activeColor}80` : 'none', fontFamily: fontF };
                }
                if (isOutline) {
                    return { backgroundColor: isActive ? activeColor + '0D' : 'transparent', color: isActive ? activeColor : baseTextColor, borderRadius: radius, border: `1px solid ${isActive ? activeColor : baseTextColor + '20'}`, fontFamily: fontF };
                }
                return { backgroundColor: 'transparent', color: isActive ? activeColor : baseTextColor, border: '1px solid transparent', borderRadius: '0px', fontFamily: fontF };
            };

            if (isInitialLoading) {
                return (
                    <div className="absolute inset-0 z-50 flex items-center justify-center transition-opacity duration-1000" style={{ backgroundColor: settings.backgroundColor }}>
                        <div className="w-24 h-24 rounded-full flex items-center justify-center font-bold text-5xl shadow-2xl animate-subtle-pulse" style={{ backgroundColor: settings.headingColor, color: settings.backgroundColor, fontFamily: getFontFamily(settings.headingFontFamily || settings.fontFamily) }}>
                            {settings.brandName?.charAt(0) || "B"}
                        </div>
                    </div>
                );
            }

            if (!activeDate) return <div className="h-full w-full flex items-center justify-center font-bold text-xl opacity-20">No Availability</div>;

            return (
                <div className="w-full h-full flex flex-col transition-all duration-1000 select-none pb-12" style={dynamicStyles}>
                {step === 1 && (
                    <div className="animate-in fade-in slide-in-from-bottom-20 duration-1000 min-h-full flex flex-col p-6 md:p-12 relative z-10">
                    
                    {/* BRAND HEADER */}
                    <header className="mb-10 flex-shrink-0 text-left">
                        <div className={`flex items-center gap-4 mb-8 ${inspectClass}`} onClick={() => isPreview && onInspect('visuals')}>
                            <div className="w-12 h-[2px]" style={{ backgroundColor: settings.primaryColor }} />
                            <span className="text-[9px] font-bold uppercase tracking-[0.6em] opacity-40" style={{ color: settings.bodyColor }}>{settings.tagline}</span>
                        </div>

                        {settings.bannerImage && (
                            <img
                                src={settings.bannerImage}
                                className={`w-full aspect-[16/7] max-h-64 rounded-lg object-cover shadow-sm mb-8 border border-neutral-100/10 ${inspectClass}`}
                                alt="Booking page banner"
                                onClick={() => isPreview && onInspect('identity')}
                            />
                        )}
                        
                        {settings.logo && (
                            <img src={settings.logo} className={`w-20 h-20 md:w-24 md:h-24 rounded-lg object-cover shadow-sm mb-6 border border-neutral-100/10 ${inspectClass}`} alt="Brand Logo" onClick={() => isPreview && onInspect('identity')} />
                        )}

                        <h1 className={`text-5xl md:text-8xl font-bold tracking-tighter mb-4 leading-[0.85] ${inspectClass}`} style={{ color: settings.headingColor, fontFamily: getFontFamily(settings.headingFontFamily || settings.fontFamily) }} onClick={() => isPreview && onInspect('identity')}>
                            {settings.brandName}
                        </h1>
                        <p className={`opacity-60 text-lg md:text-xl font-light leading-relaxed max-sm:text-sm ${inspectClass} mb-4`} style={{ color: settings.bodyColor }} onClick={() => isPreview && onInspect('identity')}>
                            {settings.welcomeMessage}
                        </p>

                        <div className="flex flex-wrap items-center gap-3 mt-4">
                            {settings.address && (
                                <span className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest" style={{ backgroundColor: settings.headingColor + '10', color: settings.headingColor }}>
                                    <MapPin size={12} /> {settings.address}
                                </span>
                            )}
                            {settings.features?.location && (
                                <a href={settings.features.location} target="_blank" className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all hover:opacity-80" style={{ backgroundColor: settings.primaryColor + '20', color: settings.primaryColor }}>
                                    <MapPin size={12} /> Get Directions
                                </a>
                            )}
                            {settings.socials?.instagram && (
                                <a href={`https://instagram.com/${settings.socials.instagram.replace('@','')}`} target="_blank" className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all hover:opacity-80" style={{ backgroundColor: settings.headingColor + '10', color: settings.headingColor }}>
                                    <Instagram size={12} /> IG
                                </a>
                            )}
                            {settings.socials?.website && (
                                <a href={settings.socials.website} target="_blank" className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all hover:opacity-80" style={{ backgroundColor: settings.headingColor + '10', color: settings.headingColor }}>
                                    <Globe size={12} /> Web
                                </a>
                            )}
                        </div>
                    </header>

                    <div className="space-y-16 flex-1">
                        
                        {/* DATE SLIDER */}
                        <section>
                        <div className={`flex items-end justify-between mb-6 px-1 ${inspectClass}`} onClick={() => isPreview && onInspect('copy')}>
                            <div>
                                <h3 className="text-[9px] font-bold uppercase tracking-[0.4em] mb-2 opacity-40" style={{ color: settings.bodyColor }}>01 // {settings.dateLabel || "Which day?"}</h3>
                                <div className="flex items-center gap-4">
                                    <h4 className="text-xl md:text-2xl font-bold tracking-tight" style={{ color: settings.headingColor, fontFamily: getFontFamily(settings.headingFontFamily || settings.fontFamily) }}>
                                        {activeDate.month} <span className="font-light italic opacity-40">{activeDate.year}</span>
                                    </h4>
                                    {settings.features?.firstAvailable && (
                                        <button onClick={handleFirstAvailable} className="px-3 py-1 text-[8px] font-bold uppercase tracking-widest rounded-full transition-all" style={{ backgroundColor: settings.primaryColor, color: settings.buttonTextColor || '#000', fontFamily: getFontFamily(settings.buttonFontFamily || settings.fontFamily) }}>First Available</button>
                                    )}
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button className="appearance-none outline-none focus:outline-none w-8 h-8 rounded-full flex items-center justify-center transition-all opacity-20 hover:opacity-100 border" style={{ borderColor: (settings.headingColor || '#000') + '30', color: settings.headingColor }}><ChevronLeft size={14} /></button>
                                <button className="appearance-none outline-none focus:outline-none w-8 h-8 rounded-full flex items-center justify-center transition-all opacity-20 hover:opacity-100 border" style={{ borderColor: (settings.headingColor || '#000') + '30', color: settings.headingColor }}><ChevronRight size={14} /></button>
                            </div>
                        </div>
                        
                        <div className="relative w-full overflow-hidden h-[130px] md:h-[150px]">
                            <div className={`flex gap-3 md:gap-4 overflow-x-auto h-[180px] md:h-[200px] pt-4 px-2 snap-x ${isPreview ? 'cursor-pointer' : ''} [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]`} onClick={() => isPreview && onInspect('visuals')}>
                                {dates.map((d, i) => {
                                const isActive = selectedDateIdx === i;
                                return (
                                    <button key={i} onClick={() => setSelectedDateIdx(i)} className={`appearance-none outline-none focus:outline-none snap-center flex-shrink-0 w-16 h-[96px] md:w-20 md:h-[112px] flex flex-col items-center justify-center gap-1.5 transition-all duration-500 relative ${isActive ? 'shadow-xl scale-105 z-10' : 'opacity-60 hover:opacity-100'}`} style={getDateSlotStyle(isActive)}>
                                        <span className={`text-[9px] md:text-[10px] font-bold uppercase tracking-[0.3em] transition-all`}>{d.dayName}</span>
                                        <span className={`text-3xl md:text-4xl font-bold tracking-tighter transition-all`}>{d.dayNum}</span>
                                        {settings.availabilityStyle === 'minimal' && isActive && <div className="absolute -bottom-3 w-10 h-[2px] rounded-full" style={{ backgroundColor: settings.primaryColor }} />}
                                    </button>
                                );
                                })}
                            </div>
                        </div>
                        </section>

                        {/* TIME GRID OR WAITLIST */}
                        <section>
                        <div className={`flex flex-col items-start mb-6 px-1 ${inspectClass}`} onClick={() => isPreview && onInspect('copy')}>
                            <h3 className="text-[9px] font-bold uppercase tracking-[0.4em] mb-2 opacity-40" style={{ color: settings.bodyColor }}>02 // {settings.timeLabel || "Select Time"}</h3>
                            <h4 className="text-xl md:text-2xl font-bold tracking-tight" style={{ color: settings.headingColor, fontFamily: getFontFamily(settings.headingFontFamily || settings.fontFamily) }}>
                                {isWaitlistMode ? 'Day Full - Join Waitlist' : 'Available Slots'}
                            </h4>
                        </div>
                        
                        {availableTimesForActiveDate.length === 0 ? (
                            isWaitlistMode ? (
                                <div className="p-8 border border-dashed rounded-lg text-center" style={{ borderColor: settings.primaryColor }}>
                                    <Bell size={24} className="mx-auto mb-4" style={{ color: settings.primaryColor }} />
                                    <p className="text-sm font-bold mb-2" style={{ color: settings.headingColor, fontFamily: getFontFamily(settings.headingFontFamily || settings.fontFamily) }}>Standby List Active</p>
                                    <p className="text-xs opacity-60">Enter your details below. We'll notify you instantly if a slot opens.</p>
                                </div>
                            ) : (
                                <div className="py-8 text-center text-sm font-bold tracking-widest uppercase opacity-20">Fully Booked</div>
                            )
                        ) : (
                            <div className={`grid grid-cols-3 gap-3 md:gap-4 ${isPreview ? 'cursor-pointer' : ''}`} onClick={() => isPreview && onInspect('availability')}>
                                {availableTimesForActiveDate.map((t) => {
                                const isActive = selectedTime === t;
                                return (
                                    <button key={t} onClick={() => setSelectedTime(t)} className={`appearance-none outline-none focus:outline-none group relative transition-all duration-500 flex items-center justify-center w-full ${settings.availabilityStyle !== 'minimal' ? 'py-4 md:py-5' : 'py-3'} ${settings.availabilityStyle !== 'minimal' && isActive ? 'shadow-xl scale-105 z-10' : ''}`} style={getTimeSlotStyle(isActive)}>
                                        <div className="flex items-center justify-center relative w-full">
                                            <span className={`text-lg md:text-xl font-bold tracking-tighter transition-all duration-500 ${isActive && settings.availabilityStyle === 'minimal' ? '-translate-y-1 scale-110' : ''}`} style={{ fontFeatureSettings: '"tnum" on, "lnum" on' }}>{t}</span>
                                            {settings.availabilityStyle === 'minimal' && isActive && <div className="absolute -bottom-3 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full shadow-lg" style={{ backgroundColor: settings.primaryColor }} />}
                                        </div>
                                    </button>
                                );
                                })}
                            </div>
                        )}
                        </section>

                        {/* DETAILS FORM */}
                        <section className="pt-10">
                            <div className={`flex flex-col items-start mb-8 px-1 ${inspectClass}`} onClick={() => isPreview && onInspect('copy')}>
                                <h3 className="text-[9px] font-bold uppercase tracking-[0.4em] mb-2 opacity-40" style={{ color: settings.bodyColor }}>03 // {settings.detailsHeading || "Your Details"}</h3>
                                <h4 className="text-xl md:text-2xl font-bold tracking-tight" style={{ color: settings.headingColor, fontFamily: getFontFamily(settings.headingFontFamily || settings.fontFamily) }}>
                                    {isWaitlistMode ? 'Join Standby' : (settings.detailsSubHeading || "Secure Your Slot")}
                                </h4>
                            </div>
                            
                            <div className="space-y-10 px-1">
                                <div className="group relative">
                                    <label className="text-[9px] md:text-[10px] font-bold uppercase tracking-[0.5em] opacity-40 mb-3 block group-focus-within:opacity-100 transition-opacity" style={{ color: settings.headingColor }}>Full Name</label>
                                    <input type="text" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} className="w-full bg-transparent text-2xl md:text-3xl font-bold outline-none tracking-tighter transition-all pb-2" style={{ color: settings.headingColor }} />
                                    <div className="w-full h-[1px] mt-2 group-focus-within:h-[2px] transition-all" style={{ backgroundColor: (settings.headingColor || '#000') + '20' }} />
                                </div>
                                <div className="group relative">
                                    <label className="text-[9px] md:text-[10px] font-bold uppercase tracking-[0.5em] opacity-40 mb-3 block group-focus-within:opacity-100 transition-opacity" style={{ color: settings.headingColor }}>Mobile Number</label>
                                    <input type="tel" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} className="w-full bg-transparent text-2xl md:text-3xl font-bold outline-none tracking-tighter transition-all pb-2" style={{ color: settings.headingColor }} />
                                    <div className="w-full h-[1px] mt-2 group-focus-within:h-[2px] transition-all" style={{ backgroundColor: (settings.headingColor || '#000') + '20' }} />
                                </div>
                                {settings.features?.birthday && (
                                <div className="group relative">
                                    <label className="text-[9px] md:text-[10px] font-bold uppercase tracking-[0.5em] opacity-40 mb-3 block group-focus-within:opacity-100 transition-opacity flex justify-between" style={{ color: settings.headingColor }}>Birthday <span className="opacity-50 lowercase tracking-normal font-normal">Optional</span></label>
                                    <input type="text" value={formData.birthday} onChange={(e) => setFormData({...formData, birthday: e.target.value})} className="w-full bg-transparent text-2xl md:text-3xl font-bold outline-none tracking-tighter transition-all pb-2" style={{ color: settings.headingColor }} />
                                    <div className="w-full h-[1px] mt-2 group-focus-within:h-[2px] transition-all" style={{ backgroundColor: (settings.headingColor || '#000') + '20' }} />
                                </div>
                                )}
                            </div>
                        </section>

                        {/* FAQs */}
                        {settings.features?.faqs?.length > 0 && (
                        <section className="pt-10 px-1">
                            <h3 className="text-[9px] font-bold uppercase tracking-[0.4em] mb-6 opacity-40" style={{ color: settings.bodyColor }}>FAQ</h3>
                            <div className="space-y-4">
                                {settings.features.faqs.map((faq, i) => (
                                    <div key={i} className="border-b pb-4 cursor-pointer" style={{ borderColor: (settings.headingColor || '#000') + '15' }} onClick={() => setOpenFaq(openFaq === i ? null : i)}>
                                        <div className="flex justify-between items-center">
                                            <span className="font-bold text-sm" style={{ color: settings.headingColor, fontFamily: getFontFamily(settings.headingFontFamily || settings.fontFamily) }}>{faq.q}</span>
                                            {openFaq === i ? <ChevronUp size={16} style={{ color: settings.bodyColor }} /> : <ChevronDown size={16} style={{ color: settings.bodyColor }} />}
                                        </div>
                                        {openFaq === i && <p className="mt-3 text-sm opacity-80 leading-relaxed" style={{ color: settings.bodyColor }}>{faq.a}</p>}
                                    </div>
                                ))}
                            </div>
                        </section>
                        )}

                        <div className="pt-16 pb-12 mt-auto text-center">
                            <button onClick={handleAction} disabled={(!(selectedTime || isWaitlistMode) || !formData.name || !formData.phone) && !isPreview} className={`group relative appearance-none outline-none focus:outline-none w-full py-6 md:py-8 text-xs md:text-sm font-extrabold uppercase tracking-[0.3em] transition-all duration-700 flex items-center justify-center gap-4 overflow-hidden ${(!(selectedTime || isWaitlistMode) || !formData.name || !formData.phone) && !isPreview ? 'opacity-20 grayscale cursor-not-allowed' : 'hover:-translate-y-1 shadow-[0_20px_40px_-10px_rgba(0,0,0,0.3)] hover:shadow-[0_30px_60px_-15px_rgba(0,0,0,0.5)] active:translate-y-0 active:scale-95'} ${inspectClass}`} style={{ backgroundColor: settings.primaryColor, color: settings.buttonTextColor || '#000', borderRadius: settings.buttonStyle === 'pill' ? '9999px' : '0px', fontFamily: getFontFamily(settings.buttonFontFamily || settings.fontFamily) }}>
                                <div className="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-700 ease-in-out"></div>
                                <span className="relative z-10">{isWaitlistMode ? "Join Waitlist" : (settings.confirmButtonText || "Confirm Booking")}</span> 
                                <ArrowRight size={20} className="relative z-10 transition-transform duration-500 group-hover:translate-x-3" />
                            </button>
                            {settings.features?.socialProof && (
                                <p className="mt-6 text-[10px] font-bold uppercase tracking-widest opacity-40" style={{ color: settings.bodyColor }}><Flame size={12} className="inline mr-1 -mt-0.5"/> 4 People secured slots this week</p>
                            )}
                        </div>
                    </div>
                    </div>
                )}

                {step === 2 && (
                    <div className="h-full flex flex-col items-start justify-center text-left animate-in zoom-in-95 duration-1000 p-8 md:p-16 relative z-10">
                    <div className={`flex items-center gap-8 mb-20 ${inspectClass}`} onClick={() => isPreview && onInspect('visuals')}>
                        <div className="w-20 h-20 rounded-lg flex items-center justify-center shadow-2xl rotate-12" style={{ backgroundColor: settings.headingColor }}>
                        {isWaitlistMode ? <Bell size={32} strokeWidth={3} style={{ color: settings.primaryColor }} /> : <Check size={40} strokeWidth={4} style={{ color: settings.primaryColor }} />}
                        </div>
                        <div><p className="text-[10px] font-bold uppercase tracking-[0.5em] opacity-40" style={{ color: settings.bodyColor }}>Booking Status</p><p className="text-lg font-bold uppercase tracking-[0.2em]" style={{ color: settings.headingColor }}>{isWaitlistMode ? 'Standby' : 'Confirmed'}</p></div>
                    </div>
                    <h2 className={`text-7xl md:text-[8rem] font-bold mb-10 tracking-tighter leading-[0.8] ${inspectClass}`} style={{ color: settings.headingColor, fontFamily: getFontFamily(settings.headingFontFamily || settings.fontFamily) }} onClick={() => isPreview && onInspect('copy')}>
                        {isWaitlistMode ? "On The List." : (settings.successHeading || "Confirmed!")}
                    </h2>
                    <p className="opacity-60 text-xl font-light mb-24 max-w-sm leading-relaxed" style={{ color: settings.bodyColor }}>
                        {isWaitlistMode ? `You are on the standby list for ${activeDate.month} ${activeDate.dayNum}. We will text you if a slot opens.` : `Access confirmed for ${selectedTime} on ${activeDate.dayNum} ${activeDate.month}.`}
                    </p>
                    <button onClick={() => setStep(1)} className="appearance-none outline-none focus:outline-none text-[10px] font-bold uppercase tracking-[0.6em] opacity-40 hover:opacity-100 transition-all border-b pb-4" style={{ color: settings.bodyColor, borderColor: settings.bodyColor + '40' }}>New Request</button>
                    </div>
                )}
                </div>
            );
        });

        // --- CALENDAR ENGINE (Business Settings) ---
        const BusinessCalendar = ({ settings, setSettings, onSave, showToast, bookings = [] }) => {
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [expandedDate, setExpandedDate] = useState(getLocalDateStr(new Date()));
            const [isAddingSlot, setIsAddingSlot] = useState(false);
            const [newSlotTime, setNewSlotTime] = useState('18:00');
            const [scheduleStatsPeriod, setScheduleStatsPeriod] = useState('month');
            const defaultTimes = Array.isArray(settings.availableTimes) ? settings.availableTimes : [];
            const todayStr = getLocalDateStr(new Date());
            const monthLookup = {
                jan: 0, january: 0, feb: 1, february: 1, mar: 2, march: 2, apr: 3, april: 3,
                may: 4, jun: 5, june: 5, jul: 6, july: 6, aug: 7, august: 7,
                sep: 8, sept: 8, september: 8, oct: 9, october: 9, nov: 10, november: 10, dec: 11, december: 11
            };
            const dateFromKey = (dateStr) => new Date(`${dateStr}T00:00:00`);
            const addDaysToDate = (date, days) => {
                const nextDate = new Date(date);
                nextDate.setDate(nextDate.getDate() + days);
                return nextDate;
            };
            const getDateRange = (startDate, endDate) => {
                const dates = [];
                const cursor = new Date(startDate);
                while (cursor <= endDate) {
                    dates.push(getLocalDateStr(cursor));
                    cursor.setDate(cursor.getDate() + 1);
                }
                return dates;
            };
            const formatCompactDate = (date) => date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

            const daysInMonth = useMemo(() => {
                const year = currentMonth.getFullYear();
                const month = currentMonth.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) days.push(null);
                for (let i = 1; i <= daysInMonth; i++) days.push(getLocalDateStr(new Date(year, month, i)));
                return days;
            }, [currentMonth]);

            const getDayConfig = (dateStr) => {
                const savedConfig = settings.schedule?.[dateStr];
                return {
                    available: savedConfig?.available ?? true,
                    times: Array.isArray(savedConfig?.times) ? savedConfig.times : [...defaultTimes]
                };
            };

            const getBookingDateKey = (booking) => {
                if (booking.dateKey) return booking.dateKey;
                const rawDate = String(booking.date || '').trim();
                if (!rawDate) return null;
                if (/^\d{4}-\d{2}-\d{2}$/.test(rawDate)) return rawDate;
                if (/^today$/i.test(rawDate)) return todayStr;
                if (/^tomorrow$/i.test(rawDate)) {
                    const tomorrow = new Date();
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    return getLocalDateStr(tomorrow);
                }

                const dayMonthMatch = rawDate.match(/(?:mon|tue|wed|thu|fri|sat|sun)?[a-z]*,?\s*(\d{1,2})\s+([a-z]+)(?:\s+(\d{4}))?/i);
                if (dayMonthMatch) {
                    const day = Number(dayMonthMatch[1]);
                    const month = monthLookup[dayMonthMatch[2].toLowerCase()];
                    const year = Number(dayMonthMatch[3]) || currentMonth.getFullYear();
                    if (!Number.isNaN(day) && month !== undefined) return getLocalDateStr(new Date(year, month, day));
                }

                const parsed = new Date(rawDate);
                return Number.isNaN(parsed.getTime()) ? null : getLocalDateStr(parsed);
            };

            const bookingsByDate = useMemo(() => {
                return (bookings || []).reduce((summary, booking) => {
                    const dateKey = getBookingDateKey(booking);
                    if (!dateKey || booking.status === 'declined') return summary;
                    if (!summary[dateKey]) summary[dateKey] = { confirmed: 0, reserved: 0, pending: 0, waitlist: 0, total: 0 };
                    summary[dateKey].total += 1;
                    if (booking.status === 'confirmed') summary[dateKey].confirmed += 1;
                    if (booking.status === 'pending') summary[dateKey].pending += 1;
                    if (booking.status === 'waitlist' || booking.time === 'Waitlist') summary[dateKey].waitlist += 1;
                    if (booking.status !== 'waitlist' && booking.time !== 'Waitlist') summary[dateKey].reserved += 1;
                    return summary;
                }, {});
            }, [bookings, todayStr, currentMonth]);

            const getCalendarBubble = (dateStr, config) => {
                const dayBookings = bookingsByDate[dateStr] || { confirmed: 0, reserved: 0 };
                const isPastDay = dateStr < todayStr;
                const openSlots = Math.max(0, (config.times?.length || 0) - dayBookings.reserved);

                if (isPastDay || dayBookings.confirmed > 0) {
                    return {
                        label: `${dayBookings.confirmed} ${dayBookings.confirmed === 1 ? 'booking' : 'bookings'} confirmed`,
                        count: dayBookings.confirmed,
                        caption: `${dayBookings.confirmed === 1 ? 'booking' : 'bookings'} confirmed`,
                        tone: dayBookings.confirmed > 0 ? 'confirmed' : 'quiet'
                    };
                }

                if (!config.available) return { label: 'Closed', count: null, caption: 'Closed', tone: 'closed' };

                return {
                    label: `${openSlots} ${openSlots === 1 ? 'slot' : 'slots'} open`,
                    count: openSlots,
                    caption: `${openSlots === 1 ? 'slot' : 'slots'} open`,
                    tone: openSlots > 0 ? 'open' : 'full'
                };
            };

            const updateDateConfig = (dateStr, nextConfig) => {
                setSettings(prev => ({
                    ...prev,
                    schedule: {
                        ...(prev.schedule || {}),
                        [dateStr]: nextConfig
                    }
                }));
            };

            const toggleDateAvailability = (dateStr) => {
                const config = getDayConfig(dateStr);
                updateDateConfig(dateStr, {
                    ...config,
                    available: !config.available
                });
            };

            const promptForTime = (message, fallback, onSubmit) => {
                const newTime = prompt(message, fallback);
                const time = newTime?.trim();
                if (!time) return;
                onSubmit(time);
            };

            const addDefaultTime = () => {
                promptForTime("Enter time (e.g. 11:30)", "12:00", (time) => {
                    if (defaultTimes.includes(time)) {
                        showToast("That slot already exists.");
                        return;
                    }
                    setSettings(prev => ({ ...prev, availableTimes: [...(prev.availableTimes || []), time].sort() }));
                });
            };

            const getNextOpenTime = (existingTimes = []) => {
                const now = new Date();
                const currentMinutes = now.getHours() * 60 + now.getMinutes();
                const nextHalfHour = Math.ceil((currentMinutes + 1) / 30) * 30;
                for (let i = 0; i < 48; i++) {
                    const minutes = (nextHalfHour + i * 30) % (24 * 60);
                    const hour = String(Math.floor(minutes / 60)).padStart(2, '0');
                    const minute = String(minutes % 60).padStart(2, '0');
                    const candidate = `${hour}:${minute}`;
                    if (!existingTimes.includes(candidate)) return candidate;
                }
                return '18:00';
            };

            const startAddingSlot = () => {
                setNewSlotTime(getNextOpenTime(selectedConfig?.times || []));
                setIsAddingSlot(true);
            };

            const saveNewSlot = () => {
                if (!selectedConfig || !expandedDate) return;
                const time = newSlotTime?.trim();
                if (!time) return;
                if (selectedConfig.times.includes(time)) {
                    showToast("That time already exists for this day.");
                    return;
                }
                updateDateConfig(expandedDate, { ...selectedConfig, times: [...selectedConfig.times, time].sort() });
                setIsAddingSlot(false);
            };

            const selectedConfig = expandedDate ? getDayConfig(expandedDate) : null;
            const selectedDateLabel = expandedDate
                ? new Date(`${expandedDate}T00:00:00`).toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })
                : 'Select a date';

            const scheduleInsight = useMemo(() => {
                const anchorDate = expandedDate ? dateFromKey(expandedDate) : new Date();
                const weekStart = addDaysToDate(anchorDate, -((anchorDate.getDay() + 6) % 7));
                const weekEnd = addDaysToDate(weekStart, 6);
                const monthStart = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
                const monthEnd = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0);
                const periodDates = scheduleStatsPeriod === 'day'
                    ? [getLocalDateStr(anchorDate)]
                    : scheduleStatsPeriod === 'week'
                        ? getDateRange(weekStart, weekEnd)
                        : getDateRange(monthStart, monthEnd);
                const label = scheduleStatsPeriod === 'day'
                    ? selectedDateLabel
                    : scheduleStatsPeriod === 'week'
                        ? `${formatCompactDate(weekStart)} - ${formatCompactDate(weekEnd)}`
                        : currentMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

                const summary = periodDates.reduce((acc, dateStr) => {
                    const config = getDayConfig(dateStr);
                    const savedConfig = settings.schedule?.[dateStr];
                    const dayBookings = bookingsByDate[dateStr] || { confirmed: 0, reserved: 0, pending: 0, waitlist: 0, total: 0 };
                    const capacity = config.available ? (config.times?.length || 0) : 0;
                    const openSlots = dateStr >= todayStr && config.available ? Math.max(0, capacity - dayBookings.reserved) : 0;

                    acc.totalDays += 1;
                    acc.confirmed += dayBookings.confirmed;
                    acc.pending += dayBookings.pending;
                    acc.waitlist += dayBookings.waitlist;
                    acc.reserved += dayBookings.reserved;
                    acc.capacity += capacity;
                    acc.openSlots += openSlots;
                    if (config.available) acc.openDays += 1;
                    else acc.closedDays += 1;
                    if (savedConfig) acc.customDays += 1;
                    return acc;
                }, { totalDays: 0, openDays: 0, closedDays: 0, customDays: 0, capacity: 0, openSlots: 0, confirmed: 0, pending: 0, waitlist: 0, reserved: 0 });

                const fillRate = summary.capacity ? Math.min(100, Math.round((summary.reserved / summary.capacity) * 100)) : 0;
                const dayStatus = !selectedConfig ? 'Select a date' : expandedDate < todayStr ? 'Past Day' : selectedConfig.available ? 'Open' : 'Closed';

                return {
                    ...summary,
                    label,
                    fillRate,
                    dayStatus,
                    periodName: scheduleStatsPeriod.charAt(0).toUpperCase() + scheduleStatsPeriod.slice(1)
                };
            }, [scheduleStatsPeriod, expandedDate, selectedDateLabel, selectedConfig, currentMonth, settings.schedule, settings.availableTimes, bookingsByDate, todayStr]);

            const scheduleMetricCards = useMemo(() => {
                if (scheduleStatsPeriod === 'day') {
                    return [
                        { label: 'Day Status', value: scheduleInsight.dayStatus, hint: scheduleInsight.label, icon: scheduleInsight.dayStatus === 'Closed' ? XCircle : CheckCircle2, tone: scheduleInsight.dayStatus === 'Open' ? 'accent' : 'neutral' },
                        { label: 'Confirmed', value: scheduleInsight.confirmed, hint: `${scheduleInsight.pending} pending`, icon: CalendarCheck, tone: 'light' },
                        { label: 'Open Slots', value: scheduleInsight.openSlots, hint: `${scheduleInsight.capacity} capacity`, icon: Clock, tone: 'light' },
                        { label: 'Booking Rate', value: `${scheduleInsight.fillRate}%`, hint: `${scheduleInsight.reserved} reserved`, icon: ShieldCheck, tone: 'dark' }
                    ];
                }

                if (scheduleStatsPeriod === 'week') {
                    return [
                        { label: 'Confirmed', value: scheduleInsight.confirmed, hint: 'This week', icon: CalendarCheck, tone: 'accent' },
                        { label: 'Open Slots', value: scheduleInsight.openSlots, hint: 'Capacity left', icon: Clock, tone: 'light' },
                        { label: 'Open Days', value: `${scheduleInsight.openDays}/${scheduleInsight.totalDays}`, hint: `${scheduleInsight.closedDays} closed`, icon: CheckCircle2, tone: 'light' },
                        { label: 'Booking Rate', value: `${scheduleInsight.fillRate}%`, hint: `${scheduleInsight.waitlist} waitlist`, icon: ShieldCheck, tone: 'dark' }
                    ];
                }

                return [
                    { label: 'Confirmed', value: scheduleInsight.confirmed, hint: 'This month', icon: CalendarCheck, tone: 'accent' },
                    { label: 'Open Slots', value: scheduleInsight.openSlots, hint: 'Today forward', icon: Clock, tone: 'light' },
                    { label: 'Open Days', value: `${scheduleInsight.openDays}/${scheduleInsight.totalDays}`, hint: `${scheduleInsight.closedDays} closed`, icon: CheckCircle2, tone: 'light' },
                    { label: 'Booking Rate', value: `${scheduleInsight.fillRate}%`, hint: `${scheduleInsight.waitlist} waitlist`, icon: ShieldCheck, tone: 'dark' }
                ];
            }, [scheduleStatsPeriod, scheduleInsight]);

            useEffect(() => {
                setIsAddingSlot(false);
            }, [expandedDate]);

            return (
                <div className="w-full max-w-7xl mx-auto pb-32 animate-in fade-in duration-700">
                    <header className="mb-8 flex flex-col xl:flex-row xl:items-end justify-between gap-6">
                        <div>
                            <p className="text-[10px] font-bold uppercase tracking-[0.35em] text-neutral-400 mb-3">Availability Studio</p>
                            <h2 className="text-4xl md:text-6xl font-bold tracking-tight text-black">Schedule</h2>
                            <p className="text-neutral-500 text-base md:text-lg mt-3 max-w-2xl">Shape your default slots, close specific dates, and fine tune each day without leaving the calendar.</p>
                        </div>
                        <div className="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                            <button onClick={() => showToast("iCal sync URL copied to clipboard.")} className="h-11 px-5 rounded-lg bg-white border border-neutral-200 text-[11px] font-bold uppercase tracking-widest hover:bg-neutral-50 transition-colors shadow-sm text-black flex items-center justify-center gap-2">
                                <CalendarCheck size={15} /> Sync Calendar
                            </button>
                            <button onClick={onSave} className="h-11 px-5 rounded-lg bg-black text-white text-[11px] font-bold uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-neutral-800 transition-colors shadow-xl shadow-black/10">
                                <Check size={15}/> Save Schedule
                            </button>
                        </div>
                    </header>

                    <section className="saas-card overflow-hidden mb-6">
                        <div className="p-5 md:p-6 border-b border-neutral-100 flex flex-col xl:flex-row xl:items-center justify-between gap-5">
                            <div>
                                <p className="text-[10px] font-bold uppercase tracking-[0.35em] text-neutral-400 mb-2">Schedule Pulse</p>
                                <h3 className="text-xl md:text-2xl font-bold tracking-tight text-black">{scheduleInsight.periodName} Stats</h3>
                                <p className="text-sm text-neutral-500 mt-1">{scheduleInsight.label}</p>
                            </div>
                            <div className="flex bg-neutral-100 p-1.5 rounded-lg border border-neutral-200 w-full sm:w-fit">
                                {['day', 'week', 'month'].map(period => (
                                    <button
                                        key={period}
                                        onClick={() => setScheduleStatsPeriod(period)}
                                        className={`flex-1 sm:flex-none h-10 px-5 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all ${scheduleStatsPeriod === period ? 'bg-black text-white shadow-lg' : 'text-neutral-500 hover:text-black hover:bg-white'}`}
                                    >
                                        {period}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4">
                            {scheduleMetricCards.map((item, index) => {
                                const IconCmp = item.icon;
                                const isDark = item.tone === 'dark';
                                const isAccent = item.tone === 'accent';
                                return (
                                    <div key={item.label} className={`p-5 md:p-6 border-neutral-100 ${index > 0 ? 'xl:border-l' : ''} ${index % 2 === 1 ? 'sm:border-l xl:border-l' : ''} ${index > 1 ? 'sm:border-t xl:border-t-0' : ''} ${isDark ? 'bg-black text-white' : isAccent ? 'bg-[#39FF14] text-black' : 'bg-white text-black'}`}>
                                        <div className="flex items-start justify-between gap-4 mb-8">
                                            <div className={`w-10 h-10 rounded-lg flex items-center justify-center ${isDark ? 'bg-white/10 text-[#39FF14]' : isAccent ? 'bg-black text-white' : 'bg-neutral-100 text-black'}`}>
                                                <IconCmp size={17}/>
                                            </div>
                                            <span className={`max-w-[170px] text-right leading-tight text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-md ${isDark ? 'bg-white/10 text-white/65' : isAccent ? 'bg-black/10 text-black/65' : 'bg-neutral-100 text-neutral-500'}`}>{item.hint}</span>
                                        </div>
                                        <p className={`text-[10px] font-bold uppercase tracking-[0.25em] mb-2 ${isDark ? 'text-white/45' : isAccent ? 'text-black/55' : 'text-neutral-400'}`}>{item.label}</p>
                                        <p className="metric-value text-3xl md:text-4xl font-bold tracking-tight leading-none">{item.value}</p>
                                    </div>
                                );
                            })}
                        </div>
                    </section>

                    <div className="grid grid-cols-1 xl:grid-cols-12 gap-6">
                        <section className="xl:col-span-8 saas-card overflow-hidden">
                            <div className="p-5 md:p-6 border-b border-neutral-100 flex flex-col md:flex-row md:items-center justify-between gap-4">
                                <div>
                                    <h3 className="text-lg font-bold tracking-tight text-black">Monthly Calendar</h3>
                                    <p className="text-sm text-neutral-500">Select a date to tune availability and time slots.</p>
                                </div>
                                <div className="flex items-center gap-2 bg-neutral-50 p-1.5 rounded-lg border border-neutral-100 w-fit">
                                    <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1))} className="w-10 h-10 rounded-md hover:bg-white text-neutral-500 hover:text-black transition-colors flex items-center justify-center"><ChevronLeft size={18}/></button>
                                    <span className="text-[11px] font-bold uppercase tracking-widest min-w-[150px] text-center text-black">{currentMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</span>
                                    <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1))} className="w-10 h-10 rounded-md hover:bg-white text-neutral-500 hover:text-black transition-colors flex items-center justify-center"><ChevronRight size={18}/></button>
                                </div>
                            </div>

                            <div className="p-4 md:p-6 overflow-x-auto no-scrollbar">
                                <div className="min-w-[620px]">
                                <div className="grid grid-cols-7 gap-2 md:gap-3 mb-3">
                                    {['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'].map(d => (
                                        <div key={d} className="text-center text-[9px] md:text-[10px] font-bold uppercase tracking-widest text-neutral-300">{d}</div>
                                    ))}
                                </div>

                                <div className="grid grid-cols-7 gap-2 md:gap-3">
                                    {daysInMonth.map((dateStr, i) => {
                                        if (!dateStr) return <div key={`empty-${i}`} className="min-h-[92px] md:min-h-[126px] rounded-lg bg-neutral-50/60 border border-neutral-100/60" />;
                                        const dayNum = Number(dateStr.split('-')[2]);
                                        const config = getDayConfig(dateStr);
                                        const isSelected = expandedDate === dateStr;
                                        const isToday = todayStr === dateStr;
                                        const isPastDay = dateStr < todayStr;
                                        const isCustom = Boolean(settings.schedule?.[dateStr]);
                                        const calendarBubble = getCalendarBubble(dateStr, config);
                                        const bubbleClass = {
                                            open: isSelected ? 'bg-[#39FF14] text-black' : 'bg-[#39FF14]/20 text-black',
                                            confirmed: isSelected ? 'bg-[#39FF14] text-black' : 'bg-emerald-50 text-emerald-700 border-emerald-100',
                                            quiet: isSelected ? 'bg-white/10 text-white/70 border-white/10' : 'bg-neutral-100 text-neutral-400 border-neutral-200',
                                            closed: isSelected ? 'bg-red-500/20 text-red-100 border-red-400/20' : 'bg-red-50 text-red-600 border-red-100',
                                            full: isSelected ? 'bg-amber-400/20 text-amber-100 border-amber-300/20' : 'bg-amber-50 text-amber-700 border-amber-100'
                                        }[calendarBubble.tone];

                                        return (
                                            <div
                                                key={dateStr}
                                                role="button"
                                                tabIndex="0"
                                                onClick={() => setExpandedDate(dateStr)}
                                                onKeyDown={(e) => {
                                                    if (e.key === 'Enter' || e.key === ' ') {
                                                        e.preventDefault();
                                                        setExpandedDate(dateStr);
                                                    }
                                                }}

        // --- Main App Component ---
        function App() {
            const [user, setUser] = useState(null);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 4000); };

            const [settings, setSettings] = useState({
                slug: 'studio-noir', brandName: 'Studio Noir',

                primaryColor: '#39FF14', headingColor: '#000000', bodyColor: '#666666', backgroundColor: '#ffffff',
                slotBgColor: '#f5f5f5', slotTextColor: '#000000',

                buttonStyle: 'pill', availabilityStyle: 'minimal',

                detailsHeading: 'Your Details', detailsSubHeading: 'Secure Your Slot', successHeading: 'Booking Confirmed!',

                backendSkin: { enabled: false, mode: 'immersive', showBranding: true },

            });

            const [bookings, setBookings] = useState([]);
            const [staffList, setStaffList] = useState([{id: 'owner', name: 'Admin', color: '#39FF14'}]);
            const [communications, setCommunications] = useState({
                confirmed: { active: true, text: "Your booking request is confirmed! We look forward to seeing you." },
                review: { active: true, text: "Hey! Thanks for coming in today. We'd love it if you could leave a quick review." },
                waitlist: { active: true, text: "A spot just opened up for you! Tap here to claim it." },
                runningLate: { active: true, text: "Running 10-15 mins behind. See you soon!" }
            });

            const demoBookings = useMemo(() => ([
                { id: 'demo-1', clientName: 'Ari Carter', clientPhone: '+27 82 555 0184', clientBirthday: '08/14', date: 'Today', time: '10:30', status: 'pending', timestamp: Date.now() - 120000, noShowHistory: false },
                { id: 'demo-2', clientName: 'Mika Stone', clientPhone: '+27 72 555 0931', clientBirthday: '', date: 'Today', time: '14:30', status: 'confirmed', timestamp: Date.now() - 3600000, noShowHistory: false, staffId: 'owner' },
                { id: 'demo-3', clientName: 'Noah Wilde', clientPhone: '+27 79 555 4410', clientBirthday: '11/03', date: 'Tomorrow', time: 'Waitlist', status: 'waitlist', timestamp: Date.now() - 7200000, noShowHistory: true },
                { id: 'demo-4', clientName: 'Lena Vale', clientPhone: '+27 83 555 7702', clientBirthday: '', date: 'Fri, 22 May', time: '16:00', status: 'confirmed', timestamp: Date.now() - 10800000, noShowHistory: false, staffId: 'owner' }
            ]), []);

            const visibleBookings = bookings.length ? bookings : demoBookings;
            const workspaceMetrics = useMemo(() => {
                const confirmed = visibleBookings.filter(b => b.status === 'confirmed').length;
                const pending = visibleBookings.filter(b => b.status === 'pending' || b.status === 'waitlist').length;
                const conversion = visibleBookings.length ? Math.round((confirmed / visibleBookings.length) * 100) : 0;
                return {
                    requests: visibleBookings.length,
                    confirmed,
                    pending,
                    conversion
                };
            }, [visibleBookings]);

            const bookingStats = useMemo(() => {
                const pending = visibleBookings.filter(b => b.status === 'pending').length;
                const waitlist = visibleBookings.filter(b => b.status === 'waitlist').length;
                const confirmed = visibleBookings.filter(b => b.status === 'confirmed').length;
                const declined = visibleBookings.filter(b => b.status === 'declined').length;
                return {
                    all: visibleBookings.length,
                    pending,
                    confirmed,
                    waitlist,
                    declined,
                    attention: pending + waitlist
                };
            }, [visibleBookings]);

            const filteredBookings = useMemo(() => (
                bookingFilter === 'all'
                    ? visibleBookings
                    : visibleBookings.filter(b => b.status === bookingFilter)
            ), [bookingFilter, visibleBookings]);

            const clientLabelOptions = ['VIP', 'Needs Follow-up', 'Prefers WhatsApp', 'High Value', 'No-show Risk'];
            const buildClientKey = (name, phone) => {
                const phoneKey = (phone || '').replace(/\D/g, '');
                const nameKey = (name || 'client').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                return phoneKey ? `phone-${phoneKey}` : `name-${nameKey || 'client'}`;
            };

            const bookingClients = useMemo(() => {
                const clients = new Map();
                visibleBookings.forEach(booking => {
                    const id = buildClientKey(booking.clientName, booking.clientPhone);
                    const existing = clients.get(id) || {
                        id,
                        name: booking.clientName || 'Unnamed Client',
                        phone: booking.clientPhone || '',
                        birthday: booking.clientBirthday || '',
                        source: 'booking',
                        bookings: []
                    };
                    existing.name = existing.name || booking.clientName || 'Unnamed Client';
                    existing.phone = existing.phone || booking.clientPhone || '';
                    existing.birthday = existing.birthday || booking.clientBirthday || '';
                    existing.bookings.push(booking);
                    clients.set(id, existing);
                });

                return Array.from(clients.values()).map(client => {
                    const history = [...client.bookings].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                    const bookingCount = history.length;
                    const autoLabels = [];
                    if (bookingCount >= 3) autoLabels.push('Regular');
                    else if (bookingCount === 2) autoLabels.push('Returning');
                    else if (bookingCount === 1) autoLabels.push('First Time');
                    if (history.some(booking => booking.noShowHistory)) autoLabels.push('No-show Risk');
                    if (history.some(booking => booking.status === 'waitlist')) autoLabels.push('Waitlist');

                    return {
                        ...client,
                        bookings: history,
                        bookingCount,
                        lastBooking: history[0] || null,
                        autoLabels
                    };
                });
            }, [visibleBookings]);

            const clientDirectory = useMemo(() => {
                const clients = new Map(bookingClients.map(client => [client.id, client]));

                clientRecords.forEach(record => {
                    const id = record.id || buildClientKey(record.name, record.phone);
                    const bookingProfile = clients.get(id);
                    clients.set(id, {
                        ...(bookingProfile || {}),
                        ...record,
                        id,
                        name: record.name || bookingProfile?.name || 'Unnamed Client',
                        phone: record.phone || bookingProfile?.phone || '',
                        email: record.email || '',
                        birthday: record.birthday || bookingProfile?.birthday || '',
                        notes: record.notes || '',
                        avatar: record.avatar || '',
                        labels: record.labels || [],
                        bookings: bookingProfile?.bookings || [],
                        bookingCount: bookingProfile?.bookingCount || 0,
                        lastBooking: bookingProfile?.lastBooking || null,
                        autoLabels: bookingProfile?.autoLabels?.length ? bookingProfile.autoLabels : ['Manual'],
                        source: bookingProfile?.source || record.source || 'manual',
                        createdAt: record.createdAt || bookingProfile?.lastBooking?.timestamp || Date.now(),
                        updatedAt: record.updatedAt || record.createdAt || bookingProfile?.lastBooking?.timestamp || Date.now()
                    });
                });

                return Array.from(clients.values()).sort((a, b) => (
                    (b.lastBooking?.timestamp || b.updatedAt || b.createdAt || 0) -
                    (a.lastBooking?.timestamp || a.updatedAt || a.createdAt || 0)
                ));
            }, [bookingClients, clientRecords]);

            const clientMetrics = useMemo(() => ({
                total: clientDirectory.length,
                regulars: clientDirectory.filter(client => client.autoLabels?.includes('Regular') || client.labels?.includes('VIP')).length,
                firstTimers: clientDirectory.filter(client => client.autoLabels?.includes('First Time')).length,
                enriched: clientDirectory.filter(client => client.notes || client.avatar || client.labels?.length).length
            }), [clientDirectory]);

            const dashboardPortfolio = useMemo(() => {
                const today = new Date();
                const todayKey = getLocalDateStr(today);
                const tomorrow = new Date(today);
                tomorrow.setDate(tomorrow.getDate() + 1);
                const tomorrowKey = getLocalDateStr(tomorrow);
                const weekEnd = new Date(today);
                weekEnd.setDate(weekEnd.getDate() + 6);
                const weekEndKey = getLocalDateStr(weekEnd);
                const monthLookup = {
                    jan: 0, january: 0, feb: 1, february: 1, mar: 2, march: 2, apr: 3, april: 3,
                    may: 4, jun: 5, june: 5, jul: 6, july: 6, aug: 7, august: 7,
                    sep: 8, sept: 8, september: 8, oct: 9, october: 9, nov: 10, november: 10, dec: 11, december: 11
                };
                const parseBookingDate = (booking) => {
                    if (booking.dateKey) return booking.dateKey;
                    const rawDate = String(booking.date || '').trim();
                    if (!rawDate) return null;
                    if (/^\d{4}-\d{2}-\d{2}$/.test(rawDate)) return rawDate;
                    if (/^today$/i.test(rawDate)) return todayKey;
                    if (/^tomorrow$/i.test(rawDate)) return tomorrowKey;
                    const dayMonthMatch = rawDate.match(/(?:mon|tue|wed|thu|fri|sat|sun)?[a-z]*,?\s*(\d{1,2})\s+([a-z]+)(?:\s+(\d{4}))?/i);
                    if (dayMonthMatch) {
                        const day = Number(dayMonthMatch[1]);
                        const month = monthLookup[dayMonthMatch[2].toLowerCase()];
                        const year = Number(dayMonthMatch[3]) || today.getFullYear();
                        if (!Number.isNaN(day) && month !== undefined) return getLocalDateStr(new Date(year, month, day));
                    }
                    const parsed = new Date(rawDate);
                    return Number.isNaN(parsed.getTime()) ? null : getLocalDateStr(parsed);
                };

                const activeBookings = visibleBookings.filter(booking => booking.status !== 'declined');
                const bookingsWithDates = activeBookings.map(booking => ({ ...booking, dateKeyResolved: parseBookingDate(booking) }));
                const todayBookings = bookingsWithDates.filter(booking => booking.dateKeyResolved === todayKey);
                const tomorrowBookings = bookingsWithDates.filter(booking => booking.dateKeyResolved === tomorrowKey);
                const weekBookings = bookingsWithDates.filter(booking => booking.dateKeyResolved && booking.dateKeyResolved >= todayKey && booking.dateKeyResolved <= weekEndKey);
                const upcomingBookings = bookingsWithDates.filter(booking => !booking.dateKeyResolved || booking.dateKeyResolved >= todayKey);
                const todaySchedule = settings.schedule?.[todayKey] || {};
                const todayTimes = Array.isArray(todaySchedule.times) ? todaySchedule.times : [...(settings.availableTimes || [])];
                const todayAvailable = todaySchedule.available ?? true;
                const todayReserved = todayBookings.filter(booking => booking.status !== 'waitlist' && booking.time !== 'Waitlist').length;
                const todayOpenSlots = todayAvailable ? Math.max(0, todayTimes.length - todayReserved) : 0;
                const confirmedActive = activeBookings.filter(booking => booking.status === 'confirmed').length;
                const bookingRate = activeBookings.length ? Math.round((confirmedActive / activeBookings.length) * 100) : 0;
                const emailAutomations = Object.values(communications).filter(item => item?.active).length;
                const emailAutomationTotal = Object.keys(communications).length || 1;
                const pageReadinessItems = [
                    Boolean(settings.brandName),
                    Boolean(settings.slug),
                    (settings.availableTimes || []).length > 0,
                    Boolean(settings.welcomeMessage),
                    communications.confirmed?.active
                ];
                const pageReadiness = Math.round((pageReadinessItems.filter(Boolean).length / pageReadinessItems.length) * 100);
                const clientEnrichmentRate = clientMetrics.total ? Math.round((clientMetrics.enriched / clientMetrics.total) * 100) : 0;
                const hour = today.getHours();
                const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';

                return {
                    greeting,
                    todayKey,
                    todayBookings,
                    tomorrowBookings,
                    weekBookings,
                    upcomingBookings,
                    todayOpenSlots,
                    todayCapacity: todayAvailable ? todayTimes.length : 0,
                    todayAvailable,
                    bookingRate,
                    emailAutomations,
                    emailAutomationTotal,
                    pageReadiness,
                    clientEnrichmentRate,
                    noShowRisk: activeBookings.filter(booking => booking.noShowHistory).length,
                    needsAttention: bookingStats.attention,
                    confirmedActive,
                    activeBookings: activeBookings.length
                };
            }, [visibleBookings, settings.schedule, settings.availableTimes, settings.brandName, settings.slug, settings.welcomeMessage, communications, clientMetrics, bookingStats.attention]);

            const filteredClients = useMemo(() => {
                const query = clientSearch.trim().toLowerCase();
                if (!query) return clientDirectory;
                return clientDirectory.filter(client => (
                    [
                        client.name,
                        client.phone,
                        client.email,
                        ...(client.labels || []),
                        ...(client.autoLabels || [])

                ));
            }, [clientDirectory, clientSearch]);

            const selectedClient = useMemo(() => (

            useEffect(() => {

            const navItems = [
                { id: 'overview', icon: Layout, label: 'Dashboard' },

                { id: 'staff', icon: Users, label: 'Team' },
                { id: 'profile', icon: User, label: 'Profile' }

            const themePaletteOptions = useMemo(() => (
                THEME_PALETTE_FILTERS
                    .map(filter => ({ ...filter, count: PRESET_THEMES.filter(theme => filter.match(theme)).length }))
                    .filter(filter => filter.id === 'all' || filter.count > 0)
            ), []);

            const visibleThemes = useMemo(() => {
                const activeFilter = THEME_PALETTE_FILTERS.find(filter => filter.id === themePalette) || THEME_PALETTE_FILTERS[0];
                return PRESET_THEMES.filter(theme => activeFilter.match(theme));

                const surface = backendSkinMode === 'soft'

                    '--skin-surface': surface,
                    '--skin-panel': panel,
                    '--skin-input': input,
                    '--skin-heading': heading,
                    '--skin-text': heading,

                    '--skin-on-primary': onPrimary,

                    const padding = device === 'desktop' ? 140 : 60;

                const t1 = setTimeout(updateScale, 50);
                const t2 = setTimeout(updateScale, 400);
                const t3 = setTimeout(updateScale, 800);

                return () => {
